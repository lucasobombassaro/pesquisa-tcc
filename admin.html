<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin · Respostas TCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg:       #f2f2f7;
      --surface:  rgba(255,255,255,0.82);
      --solid:    #ffffff;
      --border:   rgba(0,0,0,0.09);
      --blue:     #0071e3;
      --blue-h:   #005bbf;
      --blue-lt:  rgba(0,113,227,0.10);
      --green:    #34c759;
      --green-lt: rgba(52,199,89,0.12);
      --red:      #ff3b30;
      --red-lt:   rgba(255,59,48,0.10);
      --text:     #1d1d1f;
      --text2:    #6e6e73;
      --text3:    #8e8e93;
      --r-sm:     10px;
      --r-md:     16px;
      --r-lg:     22px;
      --shadow:   0 2px 20px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
      --shadow-lg:0 16px 56px rgba(0,0,0,0.16);
      --ease:     cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:'Inter',-apple-system,sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100dvh;
      -webkit-font-smoothing:antialiased;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(0,113,227,0.07) 0%,transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(52,199,89,0.05) 0%,transparent 60%);
    }

    /* ── LOGIN ── */
    #overlay {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,0.45);
      backdrop-filter:blur(18px) saturate(180%);
      display:flex; align-items:center; justify-content:center;
    }
    .login-card {
      background:var(--solid); border-radius:var(--r-lg);
      padding:40px 32px 32px; width:min(360px,90vw);
      box-shadow:var(--shadow-lg); text-align:center;
    }
    .login-icon {
      width:60px; height:60px; border-radius:18px;
      background:var(--blue-lt); display:flex;
      align-items:center; justify-content:center;
      font-size:28px; margin:0 auto 18px;
    }
    .login-title { font-size:20px; font-weight:700; margin-bottom:4px; }
    .login-sub   { font-size:13px; color:var(--text2); margin-bottom:24px; line-height:1.5; }
    .t-input {
      width:100%; padding:13px 16px;
      border:1.5px solid var(--border); border-radius:var(--r-sm);
      font-family:inherit; font-size:15px;
      background:var(--bg); color:var(--text); outline:none;
      transition:border-color .2s;
    }
    .t-input:focus { border-color:var(--blue); }
    .btn {
      width:100%; padding:13px 24px; margin-top:12px;
      background:var(--blue); color:#fff;
      border:none; border-radius:var(--r-sm);
      font-family:inherit; font-size:15px; font-weight:600;
      cursor:pointer; transition:background .2s, transform .1s;
    }
    .btn:hover  { background:var(--blue-h); }
    .btn:active { transform:scale(.98); }
    .pw-err { font-size:12px; color:var(--red); margin-top:8px; display:none; }

    /* ── HEADER ── */
    #app { display:none; position:relative; z-index:1; }
    .header {
      position:sticky; top:0; z-index:100;
      background:rgba(242,242,247,0.9);
      backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border);
    }
    .header-inner {
      max-width:860px; margin:0 auto;
      display:flex; align-items:center; gap:12px;
      height:56px; padding:0 20px;
    }
    .header-title { font-size:16px; font-weight:700; flex:1; }
    .header-title span { color:var(--blue); }

    .live-pill {
      display:flex; align-items:center; gap:5px;
      padding:4px 10px; border-radius:20px;
      font-size:11px; font-weight:600;
      background:var(--green-lt); color:var(--green);
      border:1px solid rgba(52,199,89,0.25);
    }
    .live-pill.off { background:var(--red-lt); color:var(--red); border-color:rgba(255,59,48,.25); }
    .live-dot {
      width:6px; height:6px; border-radius:50%; background:currentColor;
      animation:pdot 1.8s ease-in-out infinite;
    }
    @keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }

    /* ── STATS ── */
    .stats {
      max-width:860px; margin:0 auto;
      padding:20px 20px 0;
      display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    }
    @media(max-width:520px){ .stats{ grid-template-columns:repeat(3,1fr); gap:8px; } }
    .stat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-md); padding:16px;
      box-shadow:var(--shadow); backdrop-filter:blur(10px);
    }
    .stat-num   { font-size:30px; font-weight:700; line-height:1; margin-bottom:4px; }
    .stat-label { font-size:12px; color:var(--text2); font-weight:500; }
    .stat-card.blue   .stat-num { color:var(--blue); }
    .stat-card.green  .stat-num { color:var(--green); }
    .stat-card.orange .stat-num { color:#ff9500; }

    /* ── NEW NOTIF ── */
    .notif {
      display:none; position:fixed; top:68px; left:50%;
      transform:translateX(-50%);
      background:var(--blue); color:#fff;
      padding:10px 18px; border-radius:20px;
      font-size:13px; font-weight:600;
      box-shadow:0 4px 20px rgba(0,113,227,.45);
      z-index:300; cursor:pointer;
      animation:popIn .3s var(--ease);
    }
    .notif.show { display:block; }
    @keyframes popIn { from{opacity:0;transform:translateX(-50%) scale(.9)} to{opacity:1;transform:translateX(-50%) scale(1)} }

    /* ── CONTROLS ── */
    .controls {
      max-width:860px; margin:0 auto;
      padding:16px 20px;
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    .search-wrap { flex:1; min-width:180px; position:relative; }
    .search-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
    .search-input {
      width:100%; padding:10px 12px 10px 36px;
      border:1.5px solid var(--border); border-radius:var(--r-sm);
      font-family:inherit; font-size:14px;
      background:var(--solid); color:var(--text); outline:none;
      transition:border-color .2s;
    }
    .search-input:focus { border-color:var(--blue); }

    .sort-btn {
      padding:9px 14px;
      border:1.5px solid var(--border); border-radius:var(--r-sm);
      background:var(--solid); font-family:inherit;
      font-size:13px; font-weight:500; color:var(--text2);
      cursor:pointer; transition:all .15s;
      white-space:nowrap;
    }
    .sort-btn:hover { border-color:var(--blue); color:var(--blue); }

    /* ── TABLE ── */
    .list-wrap {
      max-width:860px; margin:0 auto;
      padding:0 20px 80px;
    }
    .list-label {
      font-size:12px; font-weight:600; color:var(--text3);
      text-transform:uppercase; letter-spacing:.5px;
      margin-bottom:8px;
    }

    .resp-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-md); margin-bottom:8px;
      padding:14px 16px;
      display:grid; grid-template-columns:auto 1fr auto;
      gap:12px; align-items:center;
      box-shadow:var(--shadow); backdrop-filter:blur(10px);
      transition:transform .15s var(--ease);
      animation:cardIn .2s var(--ease) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .resp-card:hover { transform:translateY(-1px); }
    .resp-card.new-glow { box-shadow:0 0 0 2px var(--blue), var(--shadow); }

    .avatar {
      width:42px; height:42px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:700; color:#fff; flex-shrink:0;
    }
    .r-name  { font-size:15px; font-weight:600; margin-bottom:2px; }
    .r-email { font-size:12px; color:var(--text2); }
    .r-meta  { font-size:11px; color:var(--text3); margin-top:3px; }

    .r-right { text-align:right; flex-shrink:0; }
    .badge-ok {
      display:inline-flex; align-items:center; gap:4px;
      padding:4px 10px; border-radius:20px;
      font-size:11px; font-weight:600;
      background:var(--green-lt); color:var(--green);
      border:1px solid rgba(52,199,89,0.2);
      margin-bottom:4px;
    }
    .r-date { font-size:11px; color:var(--text3); }

    .empty {
      text-align:center; padding:60px 20px; color:var(--text3);
    }
    .empty p { font-size:14px; margin-top:10px; }

    /* ── TOAST ── */
    .toast {
      position:fixed; bottom:30px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(28,28,30,0.92); backdrop-filter:blur(10px);
      color:#fff; padding:10px 20px; border-radius:20px;
      font-size:13px; font-weight:500;
      opacity:0; transition:all .3s var(--ease);
      z-index:9999; pointer-events:none; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="overlay">
  <div class="login-card">
    <div class="login-icon">📋</div>
    <div class="login-title">Painel de Respostas</div>
    <div class="login-sub">Pesquisa TCC · Empreendedorismo Jovem em BH</div>
    <input class="t-input" type="password" id="pw" placeholder="Senha de acesso"
      onkeydown="if(event.key==='Enter')auth()" />
    <p class="pw-err" id="pw-err">Senha incorreta.</p>
    <button class="btn" onclick="auth()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-title">Respostas <span>·</span> TCC</div>
      <div class="live-pill off" id="live-pill">
        <span class="live-dot"></span>
        <span id="live-label">Conectando...</span>
      </div>
    </div>
  </div>

  <div class="notif" id="notif" onclick="this.classList.remove('show')"></div>

  <div class="stats">
    <div class="stat-card blue">
      <div class="stat-num" id="s-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card green">
      <div class="stat-num" id="s-today">—</div>
      <div class="stat-label">Hoje</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-num" id="s-week">—</div>
      <div class="stat-label">Esta semana</div>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="search" placeholder="Buscar por nome ou e-mail..." oninput="render()" />
    </div>
    <button class="sort-btn" onclick="toggleSort()">⇅ <span id="sort-label">Mais recente</span></button>
  </div>

  <div class="list-wrap">
    <div class="list-label" id="list-label">Carregando...</div>
    <div id="list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://wehpbpczgjxhjievamnz.supabase.co';
const SB_KEY = 'sb_publishable_bY-yOvgZcZ3QM0MUjZxUlg_9onwMIvT';
const ADM_PW = 'tcc2025puc';

let sb, rows = [], sortDesc = true;

const COLORS = ['#0071e3','#34c759','#ff9500','#af52de','#ff3b30','#5ac8fa','#30b0c7','#ff6b35'];
const avatarColor = n => COLORS[(n||'?').charCodeAt(0) % COLORS.length];
const initials    = n => (n||'?').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();

/* AUTH */
function auth(){
  if(document.getElementById('pw').value === ADM_PW){
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    init();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

async function init(){
  sb = window.supabase.createClient(SB_URL, SB_KEY);
  const { data } = await sb.from('respostas').select('id,nome,email,created_at,idade,genero,area_atuacao,tempo_empreendedor').order('created_at', { ascending: false });
  rows = data || [];
  updateStats();
  render();
  setupRealtime();
}

/* REALTIME */
function setupRealtime(){
  const pill  = document.getElementById('live-pill');
  const label = document.getElementById('live-label');

  sb.channel('admin-rt')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'respostas' }, p => {
      rows.unshift(p.new);
      updateStats(); render();
      showNotif(p.new);
      // highlight newest card briefly
      setTimeout(() => {
        const el = document.querySelector('.resp-card');
        if(el){ el.classList.add('new-glow'); setTimeout(()=>el.classList.remove('new-glow'), 3000); }
      }, 50);
    })
    .subscribe(s => {
      if(s === 'SUBSCRIBED'){
        pill.className = 'live-pill'; label.textContent = 'Ao vivo';
      } else if(s === 'CLOSED' || s === 'CHANNEL_ERROR'){
        pill.className = 'live-pill off'; label.textContent = 'Offline';
      }
    });
}

function showNotif(r){
  const el = document.getElementById('notif');
  el.textContent = `✓ ${r.nome || 'Alguém'} acabou de responder!`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

/* STATS */
function updateStats(){
  const now   = new Date();
  const today = now.toISOString().slice(0,10);
  const weekAgo = new Date(now - 7*864e5).toISOString();

  document.getElementById('s-total').textContent = rows.length;
  document.getElementById('s-today').textContent = rows.filter(r => (r.created_at||'').startsWith(today)).length;
  document.getElementById('s-week').textContent  = rows.filter(r => r.created_at >= weekAgo).length;
}

/* SORT */
function toggleSort(){
  sortDesc = !sortDesc;
  document.getElementById('sort-label').textContent = sortDesc ? 'Mais recente' : 'Mais antigo';
  render();
}

/* RENDER */
function render(){
  const q = (document.getElementById('search').value || '').toLowerCase();
  let items = rows.filter(r =>
    !q ||
    (r.nome  || '').toLowerCase().includes(q) ||
    (r.email || '').toLowerCase().includes(q)
  );

  items = [...items].sort((a,b) => {
    const d = new Date(a.created_at) - new Date(b.created_at);
    return sortDesc ? -d : d;
  });

  document.getElementById('list-label').textContent =
    `${items.length} resposta${items.length !== 1 ? 's' : ''}`;

  const listEl = document.getElementById('list');
  if(!items.length){
    listEl.innerHTML = `
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-3-3v6"/><rect x="3" y="3" width="18" height="18" rx="4"/>
        </svg>
        <p>${rows.length ? 'Nenhum resultado para a busca.' : 'Nenhuma resposta recebida ainda.'}</p>
      </div>`;
    return;
  }

  listEl.innerHTML = items.map((r, i) => {
    const color = avatarColor(r.nome);
    const ini   = initials(r.nome);
    const meta  = [r.idade, r.genero, r.area_atuacao].filter(Boolean).join(' · ');
    return `
      <div class="resp-card" style="animation-delay:${Math.min(i,15)*18}ms">
        <div class="avatar" style="background:${color}">${ini}</div>
        <div>
          <div class="r-name">${esc(r.nome || '—')}</div>
          <div class="r-email">${esc(r.email || '—')}</div>
          ${meta ? `<div class="r-meta">${esc(meta)}</div>` : ''}
        </div>
        <div class="r-right">
          <div class="badge-ok">✓ Respondeu</div>
          <div class="r-date">${fmtDate(r.created_at)}</div>
        </div>
      </div>`;
  }).join('');
}

/* HELPERS */
function fmtDate(iso){
  if(!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR',{
    day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
  });
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let _tt;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3000);
}
document.addEventListener('keydown', e => { if(e.key==='Enter' && document.getElementById('overlay').style.display!=='none') auth(); });
</script>
</body>
</html>
